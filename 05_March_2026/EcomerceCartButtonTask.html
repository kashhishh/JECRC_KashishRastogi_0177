<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Add to Cart</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin-top: 100px;
        }

        .product-card{
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        button{
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #218838;
        }

        #msg{
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="product-card">
        <h2>Wireless Headphones</h2>
        <p>Price: ₹1499</p>

        <button id="addCart">Add to Cart</button>

        <p id="msg"></p>
    </div>


<script>

document.getElementById("addCart").addEventListener("click", function(){

    console.log("Wireless Headphones added to cart");

    document.getElementById("msg").innerHTML =
    "Item successfully added to cart";

});

</script>

</body>
</html>
