<!DOCTYPE html>
<html>
<head>
<title>Button Click Analytics</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#36d1dc,#5b86e5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

.buy{
    background:#28a745;
    color:white;
}

.wishlist{
    background:#ff6b6b;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

.note{
    margin-top:20px;
    color:#555;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>Product Actions</h2>

<button class="buy" onclick="trackClick('Buy Now')">Buy Now</button>

<button class="wishlist" onclick="trackClick('Add Wishlist')">Add Wishlist</button>

<div class="note">
Open Console (F12) to see analytics logs
</div>

</div>

<script>

// Logger Object
const logger = {

log:function(level,message,data){

const logEntry = {
level:level,
message:message,
action:data,
time:new Date().toISOString()
};

console.log("Analytics Log:",logEntry);

}

};

// Track Button Click
function trackClick(action){

logger.log("INFO","User Action",action);

}

</script>

</body>
</html>
