<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>

body{
font-family: Arial, sans-serif;
background:white;
color:black;
text-align:center;
padding:50px;
transition:0.3s;
}

button{
padding:12px 25px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.dark{
background:black;
color:white;
}

</style>

</head>

<body>

<h1>Dark Mode Toggle Example</h1>
<p>Click the button to switch between Light Mode and Dark Mode.</p>

<button id="darkMode">Toggle Dark Mode</button>

<script>

document.getElementById("darkMode").addEventListener("click", () => {

document.body.classList.toggle("dark");

});

</script>

</body>

</html>
