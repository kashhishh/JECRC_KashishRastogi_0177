<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Search Input Keyboard Event</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
text-align:center;
padding:50px;
}

input{
width:300px;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h2>Search Product</h2>

<input type="text" id="searchBox" placeholder="Search product">

<script>

document.getElementById("searchBox").addEventListener("keydown", (e) => {

if(e.key === "Enter"){

console.log("Search triggered");

alert("Searching product...");

}

});

</script>

</body>

</html>
