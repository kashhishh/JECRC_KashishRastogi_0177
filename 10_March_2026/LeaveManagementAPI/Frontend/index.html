<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    
    :root {
        --primary-pink: #ffafcc;
        --secondary-blue: #a2d2ff;
        --soft-purple: #cdb4db;
        --bg-cream: #fdfcf0;
        --text-main: #5b5b5b;
        --card-bg: #ffffff;
    }

    [data-bs-theme='dark'] {
        --bg-cream: #2d2d2d;
        --card-bg: #3d3d3d;
        --text-main: #f0f0f0;
    }

    body { 
        background-color: var(--bg-cream);
        color: var(--text-main);
        font-family: 'Quicksand', 'Segoe UI', sans-serif; /* Quicksand is great for a cute look */
        transition: all 0.3s ease;
    }

    /* Bubble Cards */
    .card {
        border: 4px solid var(--soft-purple);
        border-radius: 25px !important;
        background-color: var(--card-bg);
        box-shadow: 8px 8px 0px var(--soft-purple);
        overflow: hidden;
        margin-bottom: 20px;
    }

    .card-header {
        background-color: var(--primary-pink) !important;
        color: white !important;
        border-bottom: 4px solid var(--soft-purple) !important;
        font-weight: 700;
        text-align: center;
        font-size: 1.1rem;
    }

    /* Soft Buttons */
    .btn {
        border-radius: 50px;
        font-weight: 700;
        text-transform: lowercase; /* Makes it look friendlier */
        letter-spacing: 0.5px;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid rgba(0,0,0,0.1);
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .btn-primary { background-color: var(--primary-pink); border-color: var(--primary-pink); color: white; }
    .btn-success { background-color: #b9fbc0; color: #4b7a4d; border-color: #98ee99; }
    .btn-danger { background-color: #ffcfd2; color: #a35d60; border-color: #f1abb0; }
    .btn-outline-secondary { border: 2px dashed var(--soft-purple); color: var(--soft-purple); }

    /* Inputs */
    .form-control, .form-select {
        border-radius: 15px;
        border: 2px solid #eee;
        padding: 10px 15px;
        background-color: #fff;
    }

    .form-control:focus {
        border-color: var(--primary-pink);
        box-shadow: 0 0 0 0.25rem rgba(255, 175, 204, 0.25);
    }

    /* Status Badges */
    .badge {
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 0.8rem;
    }

    .bg-success { background-color: #b9fbc0 !important; color: #2d5a31 !important; }
    .bg-danger { background-color: #ffcfd2 !important; color: #8e3a3d !important; }
    .bg-warning { background-color: #fbf8cc !important; color: #7a731d !important; }

    /* Tables */
    .table {
        border-collapse: separate;
        border-spacing: 0 8px;
    }

    .table tr {
        background-color: rgba(255, 255, 255, 0.5);
        border-radius: 15px;
    }

    .hidden { display: none !important; }

    /* Fun animations */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
    }

    h2 {
        color: var(--soft-purple);
        font-weight: 800;
        animation: float 3s ease-in-out infinite;
    }
</style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-end mb-2 mt-2">
        <button class="btn btn-outline-secondary btn-sm" id="darkModeToggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>

    <h2 class="text-center mb-4">Leave Management System</h2>

    <div id="authSection" class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h5 class="card-title" id="authTitle">Login</h5>
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username">
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>
            <div class="mb-3" id="roleGroup" style="display: none;">
                <select id="role" class="form-select">
                    <option value="Employee">Employee</option>
                    <option value="Manager">Manager</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button class="btn btn-primary w-100" id="loginBtn" onclick="login()">Login</button>
            <button class="btn btn-success w-100 hidden" id="registerBtn" onclick="register()">Register</button>
            
            <p class="text-center mt-3 mb-0">
                <a href="#" id="toggleAuth" onclick="toggleAuthMode()">Need to register?</a>
            </p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 id="welcomeMessage">Welcome</h4>
            <span id="roleBadge" class="badge bg-secondary fs-6"></span>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>

        <div id="employeeView" class="hidden row">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">Apply for Leave</div>
                    <div class="card-body">
                        <input type="text" id="leaveType" class="form-control mb-2" placeholder="Leave Type (e.g., Sick)">
                        <input type="date" id="startDate" class="form-control mb-2">
                        <input type="date" id="endDate" class="form-control mb-2">
                        <textarea id="reason" class="form-control mb-2" placeholder="Reason"></textarea>
                        <button class="btn btn-primary w-100" onclick="applyLeave()">Submit Request</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">My Leaves</div>
                    <ul class="list-group list-group-flush" id="myLeavesList"></ul>
                </div>
            </div>
        </div>

        <div id="managerView" class="hidden card">
            <div class="card-header bg-info text-dark">All Employee Leaves (Manager)</div>
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Dates</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="managerLeavesTableBody"></tbody>
            </table>
        </div>

        <div id="adminView" class="hidden card">
            <div class="card-header bg-dark text-white">Employee Management (Admin)</div>
            <table class="table table-striped mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminEmployeesTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
